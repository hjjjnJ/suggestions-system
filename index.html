<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>نظام البلاغات - أمن المنشآت</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;color:#eaffea;overflow:hidden;}

.bg{position:fixed;inset:0;background:url('33.png') center/cover no-repeat;transform:scale(1.05);z-index:-3;}
.tint{position:fixed;inset:0;background:linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,40,20,0.6));z-index:-2;}

.card{
  width:min(900px,95%);
  background:rgba(10,15,12,0.75);
  border:1px solid rgba(0,255,120,0.25);
  border-radius:22px;
  backdrop-filter: blur(18px);
  box-shadow:0 0 60px rgba(0,255,120,0.15);
  padding:35px;
  text-align:center;
}

.title{font-size:44px;font-weight:800;color:#d2ffd2;text-shadow:0 0 20px rgba(0,255,120,0.3);} 
.subtitle{margin-top:8px;opacity:0.7;letter-spacing:1px;}

.avatar{margin:25px 0;}
.avatar img{
  width:150px;height:150px;border-radius:50%;
  border:3px solid #00e676;
  box-shadow:0 0 30px rgba(0,255,120,0.35);
}

.box{
  margin-top:20px;
  padding:20px;
  border-radius:18px;
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(0,255,120,0.2);
}

input, textarea{
  width:100%;
  margin-bottom:12px;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(0,255,120,0.15);
  background:rgba(0,0,0,0.5);
  color:#eaffea;
  outline:none;
}

textarea{height:130px;resize:none;}

button{
  margin-top:10px;
  padding:13px 30px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#00c853,#00e676);
  color:#002b12;
  font-weight:800;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 0 25px rgba(0,255,120,0.3);
}

button:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 0 40px rgba(0,255,120,0.5);
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="tint"></div>

<div class="card">

  <div class="title">الاقتراحات والشكاوي </div>
  <div class="subtitle">قطاع امن المنشات </div>

  <div class="avatar">
    <img src="monavatar.gif">
  </div>

  <div class="box">
    <input type="text" placeholder="الاسم أو الكود (اختياري)">
    <textarea placeholder="اكتب البلاغ أو الاقتراح هنا..."></textarea>
    <button>إرسال البلاغ</button>
  </div>

</div>

<script>
const webhookURL = "https://discord.com/api/webhooks/1496981189872062514/kGsOYMQu1Dc8xRU2nSmWfirrnRkwav26xaH3QDVEnjyYAsr2jkW9w5MJYLWfY3DkghA1";

function getTicket(){
  let num = localStorage.getItem("ticket");
  num = num ? parseInt(num)+1 : 1;
  localStorage.setItem("ticket", num);
  return num;
}

document.querySelector("button").addEventListener("click", async ()=>{

  const name = document.querySelector("input").value || "غير معروف";
  const message = document.querySelector("textarea").value;

  if(!message.trim()){
    alert("اكتب البلاغ أول");
    return;
  }

  const ticket = getTicket();

  const payload = {
    embeds: [{
      color: 0x00c853,

      fields: [
        { name: "🧾 رقم البلاغ", value: `#${ticket}` },
        { name: "👤 المرسل", value: name },
        { name: "📊 الحالة", value: "جديد" },
        { name: "📝 التفاصيل", value: "```" + message + "```" }
      ],

      timestamp: new Date().toISOString()
    }]
  };

  await fetch(webhookURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  alert("تم إرسال البلاغ بنجاح");

});
</script>

</body>
</html>
